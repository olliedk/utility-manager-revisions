<!-- ══════════════════════════════════════════════════
     REVIEW FIELDS — EDIT FIELD SLIDEOUT
══════════════════════════════════════════════════ -->
<div class="review-slideout-overlay" id="fieldEditSlideoutOverlay" onclick="closeFieldEditSlideout()"></div>

<div class="review-slideout-panel" id="fieldEditSlideout">
  <div class="review-slideout-header">
    <div class="review-slideout-title">Map standard field</div>
  </div>
  <div class="review-slideout-body">

    <div class="review-slideout-section-heading" id="fieldEditSubHeader"></div>

    <div class="review-form-field">
      <label class="review-form-label">Intelligent Suggestions instructions</label>
      <textarea class="review-form-textarea" id="fieldEditInstructions" rows="4"></textarea>
    </div>

  </div>
  <div class="review-slideout-footer">
    <button class="btn-cta" onclick="closeFieldEditSlideout()">Save</button>
    <button class="btn-secondary" onclick="saveAndNextFieldEdit()">Save &amp; Next</button>
    <button class="btn-tertiary" onclick="closeFieldEditSlideout()">Cancel</button>
  </div>
</div>
