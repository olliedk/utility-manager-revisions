<div class="review-modal-overlay" id="ignoreAddressModalOverlay" onclick="handleModalOverlayClick(event, 'ignoreAddressModalOverlay')">
  <div class="review-modal">
    <div class="review-modal-header">
      <span class="review-modal-title">Ignore address</span>
      <button class="review-modal-close" onclick="closeIgnoreAddressModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="review-modal-body">
      <p class="review-modal-desc">34 Knowlton St, Camden, ME will be ignored in this upload and future uploads. Also, Camden Middle School will not be added as a building.</p>
    </div>
    <div class="review-modal-footer">
      <button class="btn-cta" onclick="closeIgnoreAddressModal()">Ignore</button>
      <button class="btn-tertiary" onclick="closeIgnoreAddressModal()">Cancel</button>
    </div>
  </div>
</div>
